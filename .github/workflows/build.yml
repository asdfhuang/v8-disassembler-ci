name: Build V8

on:
  workflow_dispatch:
    inputs:
      v8_branch:
        description: 'V8 Version / Branch'
        required: true
        default: '13.8.258.18'
  push:
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest
    env:
      V8_BRANCH: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.v8_branch || '13.8.258.18' }}
      DEPOT_TOOLS_WIN_TOOLCHAIN: 0

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install depot_tools
        # language=PowerShell
        run: |
          git clone https://chromium.googlesource.com/chromium/tools/depot_tools.git C:\depot_tools
          echo "C:\depot_tools" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Fetch V8
        # language=PowerShell
        run: |
          fetch v8
          cd v8
          git checkout $env:V8_BRANCH
          gclient sync -v
          
      - name: Upload Source
        uses: actions/upload-artifact@v4
        with:
          name: v8-src-${{ env.V8_BRANCH }}
          path: v8/src
          compression-level: 9

      - name: Patch V8
        # language=PowerShell
        run: |
          ./patcher.ps1

      - name: Patch vs_toolchain SDK version
        # language=PowerShell
        run: |
          # 1) Bypass dcomp.h SDK check
          $f = "v8\build\vs_toolchain.py"
          if (Test-Path $f) {
            $c = Get-Content $f -Raw
            $c = $c -replace 'def SDKIncludesIDCompositionDevice4\(\):', "def SDKIncludesIDCompositionDevice4():`r`n  return True`r`n  # patched-out"
            # 2) Replace hardcoded SDK version 10.0.22621.0 -> the latest installed (10.0.26100.0)
            $c = $c -replace '10\.0\.22621\.0', '10.0.26100.0'
            Set-Content -Path $f -Value $c
            Write-Host "Patched vs_toolchain.py"
            Select-String -Path $f -Pattern '10\.0\.\d+\.0' | Select-Object -First 5
          }
          # Same in setup_toolchain.py (sometimes the version is duplicated)
          $f2 = "v8\build\toolchain\win\setup_toolchain.py"
          if (Test-Path $f2) {
            (Get-Content $f2 -Raw) -replace '10\.0\.22621\.0', '10.0.26100.0' | Set-Content $f2
            Write-Host "Patched setup_toolchain.py"
          }

      - name: Build D8
        id: build
        # language=PowerShell
        run: |
          cd v8
          $release = "out.gn\x64.release"
          New-Item -ItemType Directory -Path $release -Force
          Set-Content -Path "$release\args.gn" -Value @"
          dcheck_always_on = false
          is_component_build = false
          is_debug = false
          target_cpu = "x64"
          use_custom_libcxx = false
          v8_monolithic = true
          v8_use_external_startup_data = false
          
          v8_static_library = true
          v8_enable_disassembler = true
          v8_enable_object_print = true
          # Match Node 23 build flags (so we can deserialize Node-produced .jsc cache)
          v8_enable_sandbox = false
          v8_enable_pointer_compression = false
          v8_enable_pointer_compression_shared_cage = false
          v8_enable_external_code_space = false
          v8_enable_extensible_ro_snapshot = false
          v8_enable_javascript_promise_hooks = true
          v8_use_siphash = true
          
          treat_warnings_as_errors = false
          "@
          gn gen $release
          ninja -C $release d8

          $artifact = "d8-with-disassembler-$env:V8_BRANCH"
          Add-Content -Path $env:GITHUB_OUTPUT -Value "artifact=$artifact"

      - name: Cleanup Artifact
        # language=PowerShell
        run: |
          cd v8\out.gn\x64.release
          Get-ChildItem
          Remove-Item -Path gen -Recurse -Force
          Remove-Item -Path obj -Recurse -Force

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.build.outputs.artifact }}
          path: v8/out.gn/x64.release
          compression-level: 9
